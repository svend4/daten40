openapi: 3.0.3
info:
  title: IFOS Secret Vault API
  version: "1.0.0"
servers:
  - url: https://vault.ifos.local/v1
tags:
  - name: Secrets
  - name: Profiles
  - name: Policies
  - name: Audit
paths:
  /secrets/create:
    post:
      tags: [Secrets]
      summary: Create secret
      responses:
        "200": {description: OK}
  /secrets/use:
    post:
      tags: [Secrets]
      summary: Request secret for runtime injection
      responses:
        "200": {description: OK}
  /profiles/register:
    post:
      tags: [Profiles]
      summary: Register env profile
      responses:
        "200": {description: OK}
  /policies/set:
    post:
      tags: [Policies]
      summary: Set policy pack
      responses:
        "200": {description: OK}
  /audit/query:
    get:
      tags: [Audit]
      summary: Query audit events
      responses:
        "200": {description: OK}
