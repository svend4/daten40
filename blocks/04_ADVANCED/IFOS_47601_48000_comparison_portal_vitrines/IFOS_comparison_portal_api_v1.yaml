openapi: 3.0.3
info:
  title: IFOS Comparison Portal API
  version: "1.0.0"
servers:
  - url: https://portal.ifos.local/v1
tags:
  - name: Cards
  - name: Offers
  - name: Scoring
  - name: Disclosure
  - name: Vitrines
paths:
  /cards:
    post: {tags:[Cards], summary: Create/Update product card, responses: {"200": {description: OK}}}
  /offers:
    post: {tags:[Offers], summary: Ingest offer, responses: {"200": {description: OK}}}
