openapi: 3.0.3
info:
  title: IFOS Change Control API
  version: "1.0.0"
servers:
  - url: https://change.ifos.local/v1
tags:
  - name: Rollouts
  - name: Approvals
  - name: Promotions
  - name: Incidents
paths:
  /rollouts/plan:
    post: {tags:[Rollouts], summary: Create rollout plan, responses: {"200": {description: OK}}}
